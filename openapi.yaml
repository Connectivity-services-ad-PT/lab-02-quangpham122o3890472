openapi: 3.1.0
info:
  title: Campus IoT and Core Business Event Contract
  version: 1.0.0
  description: API chuẩn hóa minh chứng Lab 02 cho hệ thống hướng sự kiện nhóm B1.
paths:
  /health:
    get:
      summary: Check health status
      operationId: checkHealth
      responses:
        '200':
          description: Server hoạt động bình thường
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /alerts/recent:
    get:
      summary: Lấy danh sách cảnh báo gần đây
      operationId: getRecentAlerts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AlertMessage'
        '401':
          description: Chưa xác thực
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /alerts/{id}:
    get:
      summary: Lấy chi tiết một cảnh báo
      operationId: getAlertById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertMessage'
  /alerts:
    post:
      summary: Đẩy một cảnh báo mới
      operationId: createAlert
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertInput'
      responses:
        '200':
          description: Tiếp nhận thành công
        '400':
          description: Dữ liệu đầu vào không hợp lệ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Sai nghiệp vụ hoặc thiếu trường dữ liệu
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      required:
        - status
        - service
        - time
      properties:
        status:
          type: string
          enum: [ok, error]
        service:
          type: string
        time:
          type: string
          format: date-time
    AlertInput:
      type: object
      required:
        - sourceService
        - alertType
        - severity
        - message
      properties:
        sourceService:
          type: string
        alertType:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        message:
          type: string
    AlertMessage:
      type: object
      required:
        - id
        - sourceService
        - alertType
        - severity
        - message
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        sourceService:
          type: string
        alertType:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        message:
          type: string
        relatedEventId:
          type:
            - string
            - "null"
          format: uuid
        status:
          type: string
          enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type:
            - string
            - "null"
          format: date-time
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          items:
            type: object
            required:
              - field
              - code
              - message
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
